<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WASM-powered Keyword Spotting</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.14.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm@3.9.0/dist/tf-backend-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.5.4/dist/speech-commands.min.js"></script>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      button { font-size: 1rem; padding: 10px 20px; }
      #label { font-weight: bold; color: #007ACC; }
    </style>
  </head>
  <body>
    <h1>Browser Keyword Spotting (WASM + Quantized CNN)</h1>
    <button id="listen">🔊 Start Listening</button>
    <p>Detected command: <span id="label">—</span></p>

    <script>
      async function run() {
        // 1. Switch to the WASM backend
        await tf.setBackend('wasm');
        await tf.ready();

        // 2. Create the recognizer: uses a small quantized CNN under the hood
        const recognizer = speechCommands.create('BROWSER_FFT');

        // 3. Load the model & metadata
        await recognizer.ensureModelLoaded();

        // 4. Wire up the button
        document.getElementById('listen').addEventListener('click', () => {
          recognizer.listen(result => {
            // scores is an array of confidence for each label
            const scores = result.scores;
            const labels = recognizer.wordLabels(); // e.g. ['yes','no','up',…]
            const maxIdx = scores.indexOf(Math.max(...scores));
            document.getElementById('label').innerText = labels[maxIdx];
          }, {
            probabilityThreshold: 0.75, // only trigger when confidence ≥ 0.75
            invokeCallbackOnNoiseAndUnknown: false
          });
        });
      }

      run();
    </script>
  </body>
</html>
