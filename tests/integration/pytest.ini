[pytest]
testpaths = tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    game_simulation: marks tests as full game simulations
    rules_compliance: marks tests validating mahjong rules
    concurrent: marks tests requiring multiple simultaneous games
    timeout: Tests with timeout requirements
    asyncio: Async tests
