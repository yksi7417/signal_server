version: '3.8'

services:
  signal-server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ../tests:/app/tests:ro
      - ../static:/app/static:ro
    command: python app.py
    networks:
      - integration-test

  test-runner:
    build:
      context: ..
      dockerfile: Dockerfile.test
    depends_on:
      signal-server:
        condition: service_healthy
    environment:
      - SERVER_URL=http://signal-server:8080
      - WS_URL=ws://signal-server:8080/ws
      - PYTHONPATH=/app
    volumes:
      - ../tests:/app/tests:ro
      - ../mahjong_engine:/app/mahjong_engine:ro
      - ./test-results:/app/test-results
      - ./scenarios:/app/scenarios:ro
    command: >
      sh -c "
        echo 'Waiting for server to be fully ready...' &&
        sleep 5 &&
        echo 'Running integration tests...' &&
        pytest tests/integration/ -v --tb=short \\
          --html=/app/test-results/report.html \\
          --self-contained-html \\
          --json-report \\
          --json-report-file=/app/test-results/report.json \\
          -m 'integration' || true &&
        echo 'Tests complete. Check /app/test-results/ for reports.'
      "
    networks:
      - integration-test

  test-client:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    depends_on:
      - signal-server
    environment:
      - SE_OPTS=--log-level INFO
    ports:
      - "4444:4444"
      - "7900:7900"
    networks:
      - integration-test

networks:
  integration-test:
    driver: bridge
