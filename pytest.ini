[pytest]
# Pytest configuration for Signal Server

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests (slower, require server)
    ui: UI tests (slowest, require browser and running server)
    slow: Slow tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Async support
asyncio_mode = auto

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=mahjong_engine --cov=app --cov-report=html --cov-report=term
