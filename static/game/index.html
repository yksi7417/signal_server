<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Mahjong Game</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
    }

    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 0 auto;
    }

    .discard-area {
      width: 100%;
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 1px;
      margin: 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
    }

    .discard-tile {
      font-size: 3em;
      padding: 1px;
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 1px;
    }

    .latest-discard {
      background-color: #ffe6e6;
      border-color: #ffcccc;
    }
  </style>
</head>

<body>
  <div class="game-area">
    <h1>Mahjong Game</h1>
    <!-- <button id="draw">Draw a Tile</button> --> <!-- Commented out -->
    <button id="reset">Reset</button>
    <div id="game-info">Game information will load here...</div>
    <div id="remaining-tiles" style="margin-top: 10px; font-weight: bold;">Remaining Tiles: --</div>

    <div style="margin: 20px auto; width: 95%; max-width: 1200px;">
      <div id="discard-area" style="
            min-height: 150px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        "></div>
    </div>

    <div id="player-console" style="margin-top: 10px; color: green;"></div>
    <div id="player-hand" style="margin-top: 20px; font-size: 3em;">Your hand will load here...</div>
    <div id="revealed-sets-display" style="margin-top: 20px; font-size: 2.5em;">Revealed Sets: None</div>
    <div id="claim-prompt" style="margin-top: 15px; padding: 10px; border: 1px solid orange; display: none;">
      <p id="claim-message">Message about claim.</p>
      <button id="btnClaimYes">Yes</button>
      <button id="btnClaimNo">No</button>
      <div id="claim-type" style="display: none;"></div>
    </div>
    <div style="margin-top: 10px; ">
      <button id="btnDrawTile">Draw Tile</button>
      <button id="btnDiscardTile" disabled>Discard Tile</button>
    </div>
    <div id="selected-tile-display" style="margin-top: 10px; font-weight: bold;">Selected Tile: None</div>

    <script type="module" src="{{ url_for('static', filename='main.js') }}"></script>

</body>

</html>
