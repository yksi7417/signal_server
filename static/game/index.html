<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Mahjong Game</title>
  <link rel="stylesheet" href="game/styles/game.css">
</head>

<body>
  <div class="game-area">
      <div id="discard-area" style="
            min-height: 200px;
            max-height: 200px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: flex-start;
            background-color: #f5f5f5;
            overflow-y: auto;
            overflow-x: hidden;
        "></div>
    </div>

    <div id="game-info-rows">
      <div id="game-info">Game information will load here...</div>
      <div id="remaining-tiles" style="margin-top: 10px; font-weight: bold;">Remaining Tiles: --</div>    
      <div id="selected-tile-display" style="margin-top: 10px; font-weight: bold;">Selected Tile: None</div>
      <div id="player-console" style="margin-top: 10px; color: green;"></div>
    </div>

    <div id="game-hand-group">
      <div id="player-hand" style="margin-top: 20px; font-size: 3em;">Your hand will load here...</div>
      <div id="revealed-sets-display" style="margin-top: 20px; font-size: 2.5em;"></div>
      <div style="margin-top: 10px; ">
        <button id="btnDrawTile">Draw Tile</button>
        <button id="btnDiscardTile" disabled>Discard Tile</button>
        <button id="btnClaimYes" disabled>Yes</button>
        <button id="btnClaimNo" disabled>No</button>
        <button id="reset" disabled>Reset</button>
      </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='main.js') }}"></script>

</body>

</html>
