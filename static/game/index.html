<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mahjong">
  <!-- Dynamic base: Capacitor serves from root, server from /static/ -->
  <script>
    var isCapacitor = typeof window.Capacitor !== 'undefined' || window.location.protocol === 'capacitor:';
    var base = document.createElement('base');
    base.href = isCapacitor ? '/' : '/static/';
    document.head.appendChild(base);
  </script>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>Mahjong Game</title>
  <link rel="stylesheet" href="styles/game.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Login overlay -->
    <div id="loginOverlay" class="login-overlay" style="display:none;">
      <div class="login-content">
        <h1>Mahjong</h1>
        <p>Sign in to track your stats and appear on the leaderboard.</p>
        <div id="appleid-signin" data-color="white" data-border="true" data-type="sign-in"></div>
        <button id="btnPlayAsGuest" class="guest-btn">Play as Guest</button>
      </div>
    </div>

    <div id="mahjong-table" class="mahjong-table">
      <!-- Top: P2 -->
      <div id="player-area-2" class="player-area player-top">
        <div class="player-label" id="player-label-2">Player 2</div>
        <div class="player-melds" id="player-melds-2"></div>
        <div class="player-hand-count" id="player-hand-count-2"></div>
      </div>

      <!-- Left: P3 -->
      <div id="player-area-3" class="player-area player-left">
        <div class="player-label" id="player-label-3">Player 3</div>
        <div class="player-melds" id="player-melds-3"></div>
        <div class="player-hand-count" id="player-hand-count-3"></div>
      </div>

      <!-- Center: game info + all discards -->
      <div id="center-info" class="center-info">
        <div id="center-status">
          <span id="remaining-tiles">Tiles: --</span>
          <span id="game-info"></span>
        </div>
        <div id="center-discards">
          <div class="center-discard-row" data-player-id="2"><span class="discard-label" id="discard-label-2">P2</span><div class="player-discards" id="player-discards-2"></div></div>
          <div class="center-discard-row" data-player-id="3"><span class="discard-label" id="discard-label-3">P3</span><div class="player-discards" id="player-discards-3"></div></div>
          <div class="center-discard-row" data-player-id="1"><span class="discard-label" id="discard-label-1">P1</span><div class="player-discards" id="player-discards-1"></div></div>
          <div class="center-discard-row" data-player-id="0"><span class="discard-label" id="discard-label-0">You</span><div class="player-discards" id="player-discards-0"></div></div>
        </div>
      </div>

      <!-- Right: P1 -->
      <div id="player-area-1" class="player-area player-right">
        <div class="player-label" id="player-label-1">Player 1</div>
        <div class="player-melds" id="player-melds-1"></div>
        <div class="player-hand-count" id="player-hand-count-1"></div>
      </div>

      <!-- Bottom: P0 (you) -->
      <div id="player-area-0" class="player-area player-bottom">
        <div class="player-label" id="player-label-0">You</div>
        <div class="player-melds" id="player-melds-0">
          <span id="revealed-sets-display"></span>
        </div>
        <div id="game-info-rows">
          <div id="selected-tile-display">Selected: </div>
          <div id="player-console"></div>
        </div>
        <div id="hand-nav">
          <button id="btnTileLeft" class="tile-nav-btn" aria-label="Previous tile">&lsaquo;</button>
          <div id="player-hand">Your hand will load here...</div>
          <button id="btnTileRight" class="tile-nav-btn" aria-label="Next tile">&rsaquo;</button>
        </div>
        <div id="button-group">
          <button id="btnDrawTile" style="display: none;">Draw Tile</button>
          <button id="btnDiscardTile" disabled>Discard Tile</button>
          <button id="btnClaimYes" disabled>Yes</button>
          <button id="btnClaimNo" disabled>No</button>
          <button id="reset" disabled>Reset</button>
          <button id="btnBugReport">Report Bug</button>
          <button id="btnStats">Stats</button>
          <span class="timer-slider-group">
            <label for="discardTimerSlider">Auto-discard:</label>
            <input type="range" id="discardTimerSlider" min="5" max="120" value="30" step="5">
            <span id="discardTimerValue">30s</span>
          </span>
        </div>
      </div>
    </div>

    <script type="module" src="game/main.js"></script>

    <!-- Voice Chat Section (hidden during game) -->
    <div id="voice-section" style="display:none;">
      <h2>Connected Peers</h2>
      <div style="display: flex; align-items: center; gap: 16px;">
        <label for="clientIdInput">Your Name:</label>
        <input id="clientIdInput" value="" />
        <button id="startButton">init...</button>
        <label id="serverLocation"></label>
      </div>
      <ul id="peerList"></ul>
      <label for="logArea">Logs:</label><br>
      <textarea id="logArea" readonly></textarea>
    </div>

    <audio id="ding" src="audio/dingdong.mp3" preload="auto"></audio>

    <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script src="scripts/Vosklet.js" async defer></script>
    <script type="module" src="scripts/voice.js"></script>
    <script type="module" src="scripts/signaling.js"></script>
    <script src="scripts/hotkey.js"></script>
    <script>
      // env.js is dynamically generated by server; provide defaults for Capacitor/local mode
      if (typeof window.Capacitor !== 'undefined' || window.location.protocol === 'capacitor:') {
        window.__ENV__ = window.__ENV__ || { APP_ENV: 'capacitor' };
      }
    </script>
    <script src="/env.js" onerror="console.log('env.js not available (local/Capacitor mode)')"></script>
    <script type="module">
      // Dynamic import path for Capacitor vs server compatibility
      // (JS import doesn't respect <base> tag)
      const isCap = typeof window.Capacitor !== 'undefined' || window.location.protocol === 'capacitor:';
      const base = isCap ? '/' : '/static/';

      const signal = await import(base + 'scripts/signaling.js');
      const voice = await import(base + 'scripts/voice.js');

      document.getElementById('clientIdInput').value =
        localStorage.getItem('clientId') || signal.myId;

      const startButton = document.getElementById('startButton');
      startButton.onclick = async () => {
        await signal.handleStartOrEnd();
        await voice.start();
      };

      // Always use Twemoji regardless of platform
      document.addEventListener('DOMContentLoaded', function() {
          if (typeof twemoji !== 'undefined') {
              twemoji.parse(document.body, {
                  folder: 'svg',
                  ext: '.svg',
                  base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/',
                  className: 'emoji'
              });
          }
      });
    </script>

</body>

</html>
