<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>WebRTC Mesh Voice Chat</title></head>
<body>
  <button onclick="start()">Start Voice Chat</button>
  <script>
  let localStream;
  let ws;
  const peers = {};
  const myId = "client-" + Math.floor(Math.random() * 10000);

  async function start() {
    console.log(`🎙️ Starting voice chat... myId: ${myId}`);
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      console.log("🎤 Microphone access granted.");

      ws = new WebSocket("wss://oracle-free-instance-20230330-1941.tail356fe.ts.net/ws");

      ws.onopen = () => {
        console.log("✅ WebSocket connected");
        ws.send(JSON.stringify({ type: "hello", id: myId }));
      };

      ws.onmessage = async ({ data }) => {
        const msg = JSON.parse(data);
        const from = msg.from;

        if (msg.type === "peer-list") {
          console.log("📨 Peer list received:", msg.peers);
          for (const peerId of msg.peers) {
            await createPeerConnection(peerId, true);
          }
        } else if (msg.type === "new-peer") {
          console.log("🆕 New peer:", msg.id);
          const peerId = msg.id;
          await createPeerConnection(peerId, true);
        } else if (msg.type === "peer-disconnect") {
          if (peers[msg.id]) {
            peers[msg.id].close();
            delete peers[msg.id];
            console.log("❌ Peer disconnected:", msg.id);
          }
        } else if (msg.type === "offer") {
          const pc = await createPeerConnection(from, false);
          await pc.setRemoteDescription(new RTCSessionDescription(msg));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          ws.send(JSON.stringify({ ...answer, from: myId, to: from }));
        } else if (msg.type === "answer") {
          await peers[from].setRemoteDescription(new RTCSessionDescription(msg));
        } else if (msg.type === "candidate") {
          await peers[from].addIceCandidate(new RTCIceCandidate(msg.candidate));
        }
      };

      ws.onerror = (err) => {
        console.error("❌ WebSocket error:", err);
      };

      ws.onclose = () => {
        console.warn("🔌 WebSocket closed");
      };
    } catch (err) {
      console.error("🚫 Error accessing microphone:", err);
    }
  }

  async function createPeerConnection(peerId, initiator = true) {
    if (peers[peerId]) return peers[peerId];

    console.log(`📞 Creating peer connection: ${peerId}, initiator: ${initiator}`);
    const pc = new RTCPeerConnection({
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
      ]
    });

    pc.onicecandidate = ({ candidate }) => {
      if (candidate) {
        ws.send(JSON.stringify({ type: "candidate", candidate, from: myId, to: peerId }));
      }
    };

    pc.ontrack = ({ streams }) => {
      console.log(`🔈 Track received from ${peerId}`);
      const audio = new Audio();
      audio.srcObject = streams[0];
      audio.autoplay = true;
      document.body.appendChild(audio);
    };

    if (localStream) {
      localStream.getTracks().forEach((track) => {
        pc.addTrack(track, localStream);
      });
    } else {
      console.warn("⚠️ localStream is not initialized.");
    }

    peers[peerId] = pc;

    if (initiator) {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({ ...offer, from: myId, to: peerId }));
    }

    return pc;
  }
  </script>
</body>
</html>
