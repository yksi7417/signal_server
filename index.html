<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebRTC Mesh Voice Chat</title>
</head>
<body>
  <h2>👥 Connected Peers</h2>
  <ul id="peerList"></ul>

  <button onclick="start()">🎙️ Start Voice Chat</button>
  <audio id="ding" src="audio/dingdong.mp3" preload="auto"></audio>

  <script>
    const peers = {};
    const myId = "client-" + Math.floor(Math.random() * 10000);
    let localStream;
    let ws;

    const peerList = document.getElementById("peerList");
    const dingSound = document.getElementById("ding");

    function updatePeerList() {
      peerList.innerHTML = Object.keys(peers).map(id => `<li>${id}</li>`).join("");
    }

    async function start() {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      ws = new WebSocket("wss://signal-server-eo-7uq.fly.dev/ws");

      ws.onopen = () => {
        console.log("✅ WebSocket connected");
        ws.send(JSON.stringify({ type: "hello", id: myId }));
      };

      ws.onmessage = async ({ data }) => {
        const msg = JSON.parse(data);
        const from = msg.from;

        if (msg.type === "peer-list") {
          for (const peerId of msg.peers) {
            await createPeerConnection(peerId, true);
          }
          updatePeerList();
        }

        else if (msg.type === "new-peer") {
          const peerId = msg.id;
          if (!peers[peerId]) {
            await createPeerConnection(peerId, true);
            dingSound.play();
            updatePeerList();
          }
        }

        else if (msg.type === "peer-disconnect") {
          if (peers[msg.id]) {
            peers[msg.id].close();
            delete peers[msg.id];
            updatePeerList();
          }
        }

        else if (msg.type === "offer") {
          if (!peers[from]) {
            const pc = await createPeerConnection(from, false);
            await pc.setRemoteDescription(new RTCSessionDescription(msg));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            ws.send(JSON.stringify({ ...answer, from: myId, to: from }));
          } else {
            console.warn("Ignored offer: connection already exists with", from);
          }
        }

        else if (msg.type === "answer") {
          const pc = peers[from];
          if (pc && pc.signalingState === "have-local-offer") {
            await pc.setRemoteDescription(new RTCSessionDescription(msg));
          } else {
            console.warn("Ignored answer: unexpected signaling state", pc?.signalingState);
          }
        }

        else if (msg.type === "candidate") {
          const pc = peers[from];
          if (pc) {
            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
          }
        }
      };

      ws.onerror = (err) => console.error("WebSocket error:", err);
      ws.onclose = () => console.warn("WebSocket closed");
    }

    async function createPeerConnection(peerId, initiator = true) {
      if (peers[peerId]) return peers[peerId];

      const pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });

      pc.onicecandidate = ({ candidate }) => {
        if (candidate) {
          ws.send(JSON.stringify({ type: "candidate", candidate, from: myId, to: peerId }));
        }
      };

      pc.ontrack = ({ streams }) => {
        const audio = new Audio();
        audio.srcObject = streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
      };

      localStream.getTracks().forEach((track) => {
        pc.addTrack(track, localStream);
      });

      peers[peerId] = pc;

      if (initiator) {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ ...offer, from: myId, to: peerId }));
      }

      updatePeerList();
      return pc;
    }
  </script>
</body>
</html>
