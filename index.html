<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebRTC Mesh Voice Chat</title>
  <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/static/styles/peer.css">
</head>
<body>
  <h2>👥 Connected Peers</h2>

  <div style="display: flex; align-items: center; gap: 16px;">
    <label for="clientIdInput">Your Name:</label>
    <input id="clientIdInput" value="" />
    <button id="startButton">init...</button>
    <label id="serverLocation"></label>
  </div>
  <ul id="peerList"></ul>

  <!-- Mahjong Speech Recognition Controls -->
  <div id="speechControls" style="margin: 20px 0; padding: 15px; border: 2px solid #4CAF50; border-radius: 8px; background-color: #f9f9f9;">
    <h3>🎤 麻雀語音識別 (Mahjong Voice Commands)</h3>
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
      <button id="speechToggle" style="padding: 8px 16px; font-size: 16px;">🎤 Start Voice Recognition</button>
      <span id="speechStatus" style="font-weight: bold; color: #666;">Ready</span>
      <span id="speechLanguage" style="font-size: 12px; color: #888;">(Cantonese/中文)</span>
    </div>
    <div id="speechResults" style="margin-top: 10px;">
      <div id="speechPartial" style="color: #666; font-style: italic;">Listening...</div>
      <div id="speechFinal" style="color: #333; font-weight: bold;">Commands will appear here</div>
    </div>
    <div id="lastCommand" style="margin-top: 10px; padding: 8px; background-color: #e8f5e8; border-radius: 4px; display: none;">
      <strong>Last Command:</strong> <span id="commandText"></span>
    </div>
  </div>

  <label for="logArea">Logs:</label><br>
  <textarea id="logArea" readonly></textarea>

  <audio id="ding" src="/static/audio/dingdong.mp3" preload="auto"></audio>
  <script src="/static/scripts/Vosklet.js" async defer></script>
  <script type="module" src="/static/scripts/voice.js"></script>
  <script type="module" src="/static/scripts/signaling.js"></script>
  <script type="module" src="/static/scripts/mahjongSpeechRecognition.js"></script>
  <script src="/static/scripts/hotkey.js"></script>
  <script src="/env.js"></script>
  <script type="module">
    import * as signal from '/static/scripts/signaling.js';
    import { start as startRecognizingCommands } from '/static/scripts/voice.js';
    import { MahjongSpeechRecognition } from '/static/scripts/mahjongSpeechRecognition.js';

    // Initialize Mahjong Speech Recognition
    let mahjongSpeech = null;
    let isSpeechActive = false;

    // DOM elements for speech recognition
    const speechToggle = document.getElementById('speechToggle');
    const speechStatus = document.getElementById('speechStatus');
    const speechPartial = document.getElementById('speechPartial');
    const speechFinal = document.getElementById('speechFinal');
    const lastCommand = document.getElementById('lastCommand');
    const commandText = document.getElementById('commandText');
    const logArea = document.getElementById('logArea');    function initializeSpeechRecognition() {
      mahjongSpeech = new MahjongSpeechRecognition();
      
      if (!mahjongSpeech.isSupported) {
        speechToggle.textContent = '❌ Not Supported';
        speechToggle.disabled = true;
        speechStatus.textContent = 'Web Speech API not supported in this browser';
        speechStatus.style.color = '#cc0000';
        return;
      }

      // Set up speech recognition event handlers
      mahjongSpeech.onCommand((commandData) => {
        console.log('🎯 Mahjong command received:', commandData);
        
        // Update UI with command
        commandText.textContent = `${commandData.keyword} → ${commandData.command} (${(commandData.confidence * 100).toFixed(1)}%)`;
        lastCommand.style.display = 'block';
        
        // Log the command
        const logMessage = `[${new Date().toLocaleTimeString()}] Voice Command: ${commandData.keyword} → ${commandData.command}`;
        logArea.value += logMessage + '\n';
        logArea.scrollTop = logArea.scrollHeight;
        
        // Play notification sound
        document.getElementById('ding').play().catch(e => console.log('Audio play failed:', e));
        
        // Here you can add game logic to handle the command
        handleMahjongCommand(commandData);
      });

      mahjongSpeech.onStatus((statusData) => {
        speechStatus.textContent = statusData.message;
        speechStatus.style.color = statusData.status === 'listening' ? '#4CAF50' : '#666';
        
        if (statusData.status === 'listening') {
          speechPartial.textContent = 'Listening for Mahjong commands...';
          speechToggle.textContent = '🛑 Stop Voice Recognition';
          isSpeechActive = true;
        } else {
          speechToggle.textContent = '🎤 Start Voice Recognition';
          isSpeechActive = false;
        }
      });

      mahjongSpeech.onError((errorData) => {
        speechStatus.textContent = `Error: ${errorData.message}`;
        speechStatus.style.color = '#cc0000';
        console.error('Speech recognition error:', errorData);
        
        const logMessage = `[${new Date().toLocaleTimeString()}] Speech Error: ${errorData.message}`;
        logArea.value += logMessage + '\n';
        logArea.scrollTop = logArea.scrollHeight;
      });

      // Set up toggle button
      speechToggle.onclick = () => {
        if (isSpeechActive) {
          mahjongSpeech.stop();
        } else {
          mahjongSpeech.start();
        }
      };
    }

    function handleMahjongCommand(commandData) {
      // This function handles the recognized Mahjong commands
      // You can integrate this with your game logic
      
      switch (commandData.command) {
        case 'win':
          console.log('Player declared win (糊/食糊)');
          // Add game logic for win declaration
          break;
        case 'pong':
          console.log('Player wants to pong (碰)');
          // Add game logic for pong
          break;
        case 'kong':
          console.log('Player wants to kong (槓/開槓)');
          // Add game logic for kong
          break;
        case 'chi':
          console.log('Player wants to chi (上)');
          // Add game logic for chi
          break;
        case 'eat':
          console.log('Player wants to eat/claim (食)');
          // Add game logic for claiming tiles
          break;
        case 'pass':
          console.log('Player passes (過)');
          // Add game logic for pass
          break;
        default:
          if (commandData.command.includes('-')) {
            // Handle tile selection (e.g., "1-dots", "east-wind")
            console.log(`Player mentioned tile: ${commandData.command}`);
            // Add game logic for tile selection/discard
          }
          break;
      }
    }

    document.getElementById('clientIdInput').value = localStorage.getItem('clientId') || signal.myId;

    const startButton = document.getElementById('startButton');
    startButton.onclick = async () => {
        await signal.handleStartOrEnd();
        await startRecognizingCommands();
        
        // Initialize speech recognition after the main app starts
        if (!mahjongSpeech) {
          initializeSpeechRecognition();
        }
    };    // Initialize speech recognition immediately if on a supported device
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition)) {
        initializeSpeechRecognition();
      }
    });
  </script>
</body>
</html>
